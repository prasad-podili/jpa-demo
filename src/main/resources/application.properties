spring.application.name=jpa-demo


# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/empdb
spring.datasource.username=postgres
spring.datasource.password=Prasad@123
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never
#spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.format_sql=true
#spring.sql.init.mode=never

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG

# #for production env, "ddl-auto" should be "none"